<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Neon Dodge Final</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  font-family: monospace;
}

canvas {
  display: block;
}

#ui {
  position: absolute;
  top: 10px;
  left: 10px;
  color: #00ffcc;
  font-size: 16px;
  text-shadow: 0 0 10px #00ffcc;
}

#msg {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  color: #00ffcc;
  font-size: 36px;
  text-align: center;
  display: none;
  text-shadow: 0 0 20px #00ffcc;
}
</style>
</head>

<body>

<div id="ui">Score: 0 | Best: 0</div>

<div id="msg">
SYSTEM CRASH 💥<br>
<small>Click to reboot</small>
</div>

<canvas id="game"></canvas>

<script>
const c = document.getElementById("game");
const ctx = c.getContext("2d");

function resize(){
  c.width = innerWidth;
  c.height = innerHeight;
}
resize();
addEventListener("resize", resize);

// INPUT
let keys = {};
addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

// 🏆 HIGH SCORE (persistent)
let best = localStorage.getItem("neon_best") || 0;

// PLAYER
class Player {
  constructor(){
    this.x = c.width/2;
    this.y = c.height - 100;
    this.size = 12;
    this.speed = 6;
  }

  update(){
    if(keys["arrowleft"]||keys["a"]) this.x -= this.speed;
    if(keys["arrowright"]||keys["d"]) this.x += this.speed;
    if(keys["arrowup"]||keys["w"]) this.y -= this.speed;
    if(keys["arrowdown"]||keys["s"]) this.y += this.speed;

    this.x = Math.max(0, Math.min(c.width, this.x));
    this.y = Math.max(0, Math.min(c.height, this.y));
  }

  draw(){
    ctx.shadowBlur = 25;
    ctx.shadowColor = "#00ffff";
    ctx.fillStyle = "#00ffff";
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }
}

// ENEMY
class Packet {
  constructor(){
    this.x = Math.random()*c.width;
    this.y = -20;
    this.size = 10 + Math.random()*15;
    this.speed = 2 + Math.random()*3;
  }

  update(boost){
    this.y += this.speed + boost;
  }

  draw(){
    ctx.shadowBlur = 20;
    ctx.shadowColor = "#ff0044";
    ctx.fillStyle = "#ff0044";
    ctx.fillRect(this.x,this.y,this.size,this.size);
    ctx.shadowBlur = 0;
  }
}

// COLLISION
function hit(a,b){
  return Math.hypot(a.x-b.x,a.y-b.y) < a.size + b.size;
}

let player = new Player();
let packets = [];
let score = 0;
let boost = 0;
let gameOver = false;

// CLICK TO RESTART
addEventListener("click", ()=>{
  if(gameOver) reset();
});

// SPAWN
function spawn(){
  if(Math.random()<0.04){
    packets.push(new Packet());
  }
}

// GRID BACKGROUND
function grid(){
  ctx.strokeStyle = "rgba(0,255,200,0.05)";
  for(let i=0;i<c.width;i+=40){
    ctx.beginPath();
    ctx.moveTo(i,0);
    ctx.lineTo(i,c.height);
    ctx.stroke();
  }
  for(let j=0;j<c.height;j+=40){
    ctx.beginPath();
    ctx.moveTo(0,j);
    ctx.lineTo(c.width,j);
    ctx.stroke();
  }
}

// UI
function updateUI(){
  document.getElementById("ui").innerText =
    `Score: ${score} | Best: ${best}`;
}

function update(){
  if(gameOver) return;

  player.update();

  boost += 0.002;
  score++;

  packets.forEach((p,i)=>{
    p.update(boost);

    if(hit(player,p)){
      end();
    }

    if(p.y > c.height+50){
      packets.splice(i,1);
    }
  });

  spawn();
  updateUI();
}

function draw(){
  ctx.fillStyle = "black";
  ctx.fillRect(0,0,c.width,c.height);

  grid();
  player.draw();
  packets.forEach(p=>p.draw());
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

// 💥 GAME OVER + SAVE BEST
function end(){
  gameOver = true;

  if(score > best){
    best = score;
    localStorage.setItem("neon_best", best);
  }

  document.getElementById("msg").style.display = "block";
}

// RESET
function reset(){
  player = new Player();
  packets = [];
  score = 0;
  boost = 0;
  gameOver = false;
  document.getElementById("msg").style.display = "none";
}

loop();
</script>

</body>
</html>
