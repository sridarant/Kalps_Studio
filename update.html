<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>System Optimization Engine</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:"Segoe UI Variable","Segoe UI",sans-serif;
      background:#0b1220;
      color:white;
      height:100vh;
      overflow:hidden;
    }

    /* ================= UPDATE BANNER ================= */

    #updateBanner{
      position:fixed;
      top:0;
      width:100%;
      background:linear-gradient(90deg,#0078d7,#00a2ff);
      padding:12px;
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      align-items:center;
      justify-content:center;
      z-index:9999;
    }

    #updateBanner select,
    #updateBanner button{
      padding:10px;
      border:none;
      border-radius:8px;
    }

    #updateBanner select{
      background:#111827;
      color:white;
    }

    #updateBanner button{
      background:white;
      color:#0078d7;
      cursor:pointer;
      font-weight:bold;
    }

    #updateText{
      width:100%;
      text-align:center;
      font-size:14px;
    }

    /* ================= MAIN APP ================= */

    .container{
      display:none; /* 🔥 hidden until update check passes */
      position:absolute;
      top:60px;
      left:50%;
      transform:translateX(-50%);
      width:92%;
      max-width:880px;
      padding:55px;
      border-radius:28px;
      background:rgba(15,23,42,0.85);
      border:1px solid rgba(255,255,255,0.08);
      backdrop-filter:blur(18px);
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      margin-bottom:40px;
    }

    .logo{
      width:54px;
      height:54px;
      background:#0078d7;
      border-radius:10px;
      display:grid;
      place-items:center;
    }

    .title{
      font-size:22px;
      font-weight:600;
    }

    select,input,button{
      width:100%;
      padding:16px;
      margin-bottom:12px;
      border-radius:12px;
      border:none;
      font-size:16px;
    }

    select{background:#111827;color:white;}
    input{background:#0f172a;color:white;display:none;}

    button{
      background:#0078d7;
      color:white;
      cursor:pointer;
    }

    .update{
      display:none;
      text-align:center;
    }

    .percent{
      font-size:64px;
    }

    .status{
      color:#cbd5e1;
      margin-bottom:20px;
    }

    .bar{
      height:12px;
      background:rgba(255,255,255,0.1);
      border-radius:999px;
      overflow:hidden;
    }

    .fill{
      height:100%;
      width:0%;
      background:linear-gradient(90deg,#00a2ff,#0078d7);
    }

    .popup{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.7);
      display:none;
      justify-content:center;
      align-items:center;
    }

    .modal{
      background:#111827;
      padding:30px;
      border-radius:18px;
      text-align:center;
    }

    /* Responsive styling */
    /* ================= RESPONSIVE ================= */

    @media (max-width: 900px){

      body{
        overflow:auto;
      }

      #updateBanner{
        position:fixed;
        inset:0;
        display:flex;
        justify-content:center;
        align-items:center;
        background:linear-gradient(135deg,#050b18,#0f172a);
        z-index:9999;
        padding:20px;
      }

      #updateBanner select,
      #updateBanner button{
        width:100%;
      }

      .container{
        position:relative;
        top:0;
        left:0;
        transform:none;
        width:95%;
        margin:20px auto;
        padding:28px;
        border-radius:18px;
      }

      .brand{
        flex-direction:column;
        text-align:center;
        margin-bottom:25px;
      }

      .logo{
        margin:auto;
      }

      .title{
        font-size:20px;
      }

      .percent{
        font-size:52px;
      }

      select,
      input,
      button{
        font-size:16px;
        padding:15px;
      }
    }

    @media (max-width:600px){

      .container{
        width:100%;
        margin:0;
        border-radius:0;
        min-height:100vh;
        padding:20px;
      }

      .title{
        font-size:18px;
      }

      .percent{
        font-size:42px;
      }

      .logo{
        width:46px;
        height:46px;
        font-size:11px;
      }

      .modal{
        width:90%;
        padding:20px;
      }

      select,
      input,
      button{
        font-size:15px;
        padding:14px;
      }
    }
    /*Update card*/
    .update-card{

      width:100%;
      max-width:520px;

      background:rgba(15,23,42,.88);

      border:1px solid rgba(255,255,255,.08);

      backdrop-filter:blur(24px);

      border-radius:28px;

      padding:40px;

      box-shadow:
              0 20px 60px rgba(0,0,0,.45),
              0 0 60px rgba(0,120,215,.18);

      animation:cardIn .5s ease;
    }

    .update-icon{

      width:80px;
      height:80px;

      margin:auto;

      border-radius:20px;

      background:linear-gradient(135deg,#0078d7,#00a2ff);

      display:grid;
      place-items:center;

      font-size:38px;

      margin-bottom:22px;
    }

    .subtitle{

      color:#b6c3d7;

      margin:10px 0 30px;

      text-align:center;

      line-height:1.5;
    }

    #updateText{

      text-align:center;

      margin-bottom:25px;

      color:#8ec5ff;

      font-size:15px;
    }

    @keyframes cardIn{

      from{

        opacity:0;
        transform:translateY(20px) scale(.96);

      }

      to{

        opacity:1;
        transform:none;

      }

    }#updateBanner select{

       background:#0b1220;

       border:1px solid rgba(255,255,255,.08);

       color:white;

       transition:.25s;

     }

    #updateBanner select:focus{

      outline:none;

      border-color:#00a2ff;

      box-shadow:0 0 0 4px rgba(0,162,255,.15);

    }#updateBanner button{

       background:linear-gradient(135deg,#00a2ff,#0078d7);

       color:white;

       font-weight:600;

       transition:.25s;

     }

    #updateBanner button:hover{

      transform:translateY(-2px);

      box-shadow:0 10px 25px rgba(0,162,255,.35);

    }

    #updateBanner button:active{

      transform:scale(.98);

    }
  </style>
</head>

<body>

<!-- ================= UPDATE CHECK SCREEN ================= -->
<div id="updateBanner">

  <div class="update-card">

    <div class="update-icon">⚡</div>

    <h1>System Update Check</h1>

</div>

</body>
<script>

  /* ================= UPDATE LOGIC ================= */

  const osSelect = document.getElementById("osSelect");
  const chipSelect = document.getElementById("chipSelect");

  osSelect.addEventListener("change", () => {

    chipSelect.innerHTML = '<option value="">Processor</option>';

    let chips = [];

    switch(osSelect.value){

      case "Windows":
        chips = [
          "Intel",
          "AMD",
          "Qualcomm Snapdragon X",
          "Any"
        ];
        break;

      case "macOS":
        chips = [
          "Apple Silicon",
          "Intel"
        ];
        break;

      case "Linux":
        chips = [
          "Intel",
          "AMD",
          "ARM",
          "RISC-V"
        ];
        break;

      case "Phone":
        chips = [
          "Apple",
          "Samsung",
          "Google",
          "OnePlus",
          "Xiaomi",
          "Nothing",
          "Motorola",
          "Sony",
          "ASUS",
          "Huawei",
          "Honor",
          "OPPO",
          "Vivo",
          "Realme",
          "POCO",
          "Infinix",
          "Tecno",
          "Nubia",
          "Lenovo",
          "HMD / Nokia"
        ];
        break;

      case "Android":
        chips = [
          "Snapdragon",
          "MediaTek",
          "Tensor",
          "Exynos",
          "Dimensity"
        ];
        break;

      case "iOS":
        chips = [
          "A18 Pro",
          "A18",
          "A17 Pro",
          "A16 Bionic"
        ];
        break;

      default:
        chips = [];
    }

    chips.forEach(c => {
      const opt = document.createElement("option");
      opt.textContent = c;
      chipSelect.appendChild(opt);
    });

  });

  function checkUpdate(){

    const os=osSelect.value;
    const chip=chipSelect.value;

    if(!os||!chip){
      alert("Select OS and processor");
      return;
    }

    // 🔥 ALWAYS allow update
    document.getElementById("updateText").innerHTML =
            "✅ Update available. Unlocking system...";

    setTimeout(()=>{

      document.getElementById("updateBanner").style.display="none";
      document.getElementById("app").style.display="block";

    },1200);

  }

  /* ================= MAIN ENGINE ================= */

  const deviceSelect=document.getElementById("deviceSelect");
  const customName=document.getElementById("customName");
  const customYear=document.getElementById("customYear");

  const update=document.getElementById("update");
  const percent=document.getElementById("percent");
  const status=document.getElementById("status");
  const fill=document.getElementById("fill");
  const deviceName=document.getElementById("deviceName");

  const popup=document.getElementById("popup");

  let progress=0;

  function toggleCustom(){
    if(deviceSelect.value==="custom"){
      customName.style.display="block";
      customYear.style.display="block";
    } else {
      customName.style.display="none";
      customYear.style.display="none";
    }
  }

  function startUpdate(){

    update.style.display="block";

    let label=deviceSelect.value;

    if(label==="custom"){
      label=customName.value+" ("+customYear.value+")";
    }

    deviceName.innerText=label;

    let messages=[
      "Optimizing system...",
      "Boosting performance...",
      "Cleaning cache...",
      "Finalizing..."
    ];

    const timer=setInterval(()=>{

      if(progress<100){

        progress+=Math.floor(Math.random()*4)+1;

        percent.innerText=progress+"%";
        fill.style.width=progress+"%";

        status.innerText=messages[Math.floor(Math.random()*messages.length)];

      } else {
        clearInterval(timer);
        popup.style.display="flex";
      }

    },500);

  }

</script>
