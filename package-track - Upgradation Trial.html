<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Package Tracker | Kalp's Studio</title>

  <style>
    body{
      font-family:Arial,sans-serif;
      margin:0;
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:
              radial-gradient(circle at top left, rgba(249,115,22,.15), transparent 40%),
              radial-gradient(circle at bottom right, rgba(59,130,246,.15), transparent 40%),
              linear-gradient(135deg,#0b1220,#020617);
      color:white;
    }

    .card{
      width:500px;
      max-width:90%;
      padding:35px;
      border-radius:20px;
      background:rgba(255,255,255,.05);
      backdrop-filter:blur(15px);
      border:1px solid rgba(255,255,255,.08);
      text-align:center;
    }

    h1{
      margin-bottom:10px;
    }

    .notice{
      display:inline-block;
      padding:8px 14px;
      border-radius:999px;
      background:#f97316;
      font-size:14px;
      margin-bottom:20px;
    }

    input{
      width:100%;
      padding:12px;
      margin:20px 0;
      border:none;
      border-radius:10px;
      background:rgba(255,255,255,.08);
      color:white;
    }

    button{
      padding:12px 20px;
      border:none;
      border-radius:10px;
      background:#f97316;
      color:white;
      cursor:pointer;
      font-weight:bold;
    }

    button:hover{
      opacity:.9;
    }

    .maintenance{
      margin-top:25px;
      color:#cbd5e1;
      line-height:1.6;
    }

    abbr{
      text-decoration:none;
      border-bottom:2px dotted #f97316;
      cursor:help;
      color:#fbbf24;
    }
  </style>
</head>
<body>

<div class="card">

  <h1>📦 Package Tracker</h1>

  <div class="notice">
    Coming Soon
  </div>

  <p>
    Enter your tracking number below.
  </p>

  <input
          type="text"
          placeholder="KS-123456789">
  <abbr title="Our package tracking system is being upgraded to provide more accurate delivery updates. Please check back later." >
    <button class="button"; disabled>
      Track Package
    </button>
  </abbr>


  <div class="maintenance">
    <abbr title="Package tracking services are currently unavailable while we upgrade our logistics platform.">
      Under Maintenance
    </abbr>

    — Our package tracking system is being upgraded to provide more accurate delivery updates. Please check back later.
  </div>

</div>

</body>
</html>
