<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kalps Studio - Checkout</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

/* ================= NAVBAR ================= */
.navbar {
  position: sticky;
  top: 0;
  display: flex;
  justify-content: space-between;
  padding: 15px 25px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  z-index: 999;
}

.navbar a {
  color: #ddd;
  text-decoration: none;
  margin-left: 15px;
}

.navbar a:hover {
  color: #fff;
}

/* ================= LAYOUT ================= */
.container {
  padding: 30px;
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 20px;
}

.box {
  background: white;
  color: black;
  padding: 20px;
  border-radius: 12px;
}

/* ================= BUTTON ================= */
button {
  width: 100%;
  padding: 12px;
  border: none;
  background: linear-gradient(135deg, #6a5acd, #ff7eb3);
  color: white;
  border-radius: 8px;
  cursor: pointer;
  margin-top: 10px;
}

/* ================= PAYMENT SCREEN ================= */
#paymentScreen {
  position: fixed;
  inset: 0;
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  background: #0b1220;
  z-index: 9999;
  gap: 20px;
}

/* ================= PRINTER LOADER ================= */
.loader.printer {
  position: relative;
  width: 120px;
  height: 55px;
  background-repeat: no-repeat;
  background-image:
    radial-gradient(circle 2.5px , #ff3d00 100%, transparent 0),
    linear-gradient(#525252 90px, transparent 0),
    linear-gradient(#ececec 120px, transparent 0),
    linear-gradient(to right, #eee 10%,#333 10%,#333 90%,#eee 90%);
  background-size: 5px 5px, 90px 10px, 120px 45px , 100px 15px;
  background-position: 110px 15px,center bottom , center bottom , center 0;
}

.loader.printer:before {
  content: "";
  width: 70px;
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  bottom: calc(100% - 10px);
  background: white;
  animation: printerPaper 4s ease-in infinite;
}

.loader.printer:after {
  content: "";
  width: 70px;
  height: 80px;
  background: white;
  position: absolute;
  left: 50%;
  transform: translateX(-50%) rotate(180deg);
  top: calc(100% - 8px);
  animation: printedPaper 4s ease-in infinite;
}

@keyframes printerPaper {
  0%,25%{height:50px}
  75%,100%{height:0}
}

@keyframes printedPaper {
  0%,30%{height:0;opacity:1}
  80%{height:80px;opacity:1}
  100%{height:80px;opacity:0}
}

/* ================= WRITE LOADER ================= */
.loader.write {
  width: 100px;
  height: 130px;
  background: white;
  border-radius: 6px;
  position: relative;
}

.loader.write:after {
  content:'';
  position:absolute;
  width:66%;
  height:60%;
  left:50%;
  top:20%;
  transform:translateX(-50%);
  background:linear-gradient(to bottom,#f79577 30%,transparent 31%);
  background-size:100% 16px;
  animation: writeDown 2s ease-out infinite;
}

@keyframes writeDown {
  0%{height:0;opacity:0}
  20%{opacity:1}
  80%{height:65%}
  100%{opacity:0}
}

/* ================= SCAN LOADER ================= */
.loader.scan {
  width: 215px;
  height: 220px;
  background:
    linear-gradient(0.25turn, transparent, #fff, transparent),
    linear-gradient(#ddd,#ddd),
    linear-gradient(#ddd,#ddd),
    linear-gradient(#ddd,#ddd);
  background-color:#fff;
  background-repeat:no-repeat;
  background-size:215px 220px,215px 130px,100px 15px,150px 15px;
  background-position:-215px 0,0 0,15px 150px,15px 180px;
  animation: loading 1.5s infinite;
  border-radius: 10px;
}

@keyframes loading {
  to {
    background-position:215px 0,0 0,15px 150px,15px 180px;
  }
}

.status {
  font-size: 18px;
  opacity: 0.9;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div><b>Kalps Studio</b></div>
  <div>
    <a href="shop.html">Shop</a>
    <a href="cart.html">Cart</a>
  </div>
</div>

<!-- MAIN -->
<div class="container">

  <div class="box">
    <h2>🧾 Order Summary</h2>
    <div id="items"></div>
  </div>

  <div class="box">
    <h3>Payment</h3>
    <p>Total: ₹<span id="total">0</span></p>
    <button onclick="startPayment()">Pay Now</button>
  </div>

</div>

<!-- PAYMENT SCREEN -->
<div id="paymentScreen">

  <div class="loader printer" id="l1"></div>
  <div class="loader write" id="l2" style="display:none"></div>
  <div class="loader scan" id="l3" style="display:none"></div>

  <div class="status" id="statusText">Processing payment...</div>

</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

/* RENDER BILL */
function render(){
  let total = 0;
  let html = "";

  cart.forEach(item=>{
    total += item.price;
    html += `<p>${item.name} - ₹${item.price}</p>`;
  });

  document.getElementById("items").innerHTML = html;
  document.getElementById("total").innerText = total;
}

/* PAYMENT FLOW (CYCLE BASED) */
function startPayment(){

  if(cart.length === 0){
    alert("Cart is empty");
    return;
  }

  const screen = document.getElementById("paymentScreen");
  const status = document.getElementById("statusText");

  const l1 = document.getElementById("l1");
  const l2 = document.getElementById("l2");
  const l3 = document.getElementById("l3");

  screen.style.display = "flex";

  /* ================= STAGE 1 ================= */
  l1.style.display = "block";
  l2.style.display = "none";
  l3.style.display = "none";
  status.innerText = "Processing payment...";

  setTimeout(() => {

    /* ================= STAGE 2 ================= */
    l1.style.display = "none";
    l2.style.display = "block";
    status.innerText = "Verifying details...";

  }, 4000); // full printer cycle

  setTimeout(() => {

    /* ================= STAGE 3 ================= */
    l2.style.display = "none";
    l3.style.display = "block";
    status.innerText = "Final security scan...";

  }, 8000); // full write cycle

  setTimeout(() => {

    status.innerText = "Confirming transaction...";

  }, 10000);

  /* ================= SUCCESS ================= */
  setTimeout(() => {

    status.innerText = "Payment Successful ✅";
	localStorage.setItem("createOrderSignal", "true");
	


    setTimeout(() => {
      localStorage.removeItem("cart");
      window.location.href = "package-track.html";
    }, 1500);

  }, 12000);
}

render();
</script>

</body>
</html>
