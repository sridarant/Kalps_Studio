<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <title>Car Racing Game | Kalps Studio</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:#0f172a;
      font-family:Arial,sans-serif;
      color:#fff;
      text-align:center;
      overflow-x:hidden;
      padding-bottom:70px;
    }

    header{
      background:#1e293b;
      padding:15px;
      font-size:24px;
      font-weight:bold;
    }

    .game-container{
      width:100%;
      display:flex;
      justify-content:center;
      margin-top:15px;
    }

    canvas{
      background:#111;
      border-radius:12px;
      width:min(95vw,400px);
      height:auto;
      display:block;
      touch-action:none;
    }

    button{
      margin-top:15px;
      padding:12px 25px;
      background:#22c55e;
      color:white;
      border:none;
      border-radius:8px;
      cursor:pointer;
      font-size:18px;
    }

    button:hover{
      background:#16a34a;
    }

    .controls{
      display:none;
      justify-content:center;
      gap:20px;
      margin-top:20px;
    }

    .control-btn{
      width:80px;
      height:80px;
      border-radius:50%;
      font-size:32px;
      background:#334155;
      color:white;
      border:none;
      user-select:none;
    }

    footer{
      position:fixed;
      bottom:0;
      width:100%;
      background:#020617;
      color:#94a3b8;
      font-size:14px;
      padding:8px;
      border-top:1px solid #1e293b;
    }

    @media (max-width:600px){

      header{
        font-size:18px;
      }

      button{
        width:90%;
        max-width:320px;
      }

      .controls{
        display:flex;
      }

      .control-btn{
        width:90px;
        height:90px;
        font-size:36px;
      }
    }
  </style>
</head>

<body>

<header>
  🏎️ Car Racing Game | Kalps Studio
</header>

<div class="game-container">
  <canvas id="gameCanvas" width="400" height="600"></canvas>
</div>

<button onclick="restartGame()">
  Restart Game
</button>

<div class="controls">
  <button class="control-btn"
          ontouchstart="keys['ArrowLeft']=true"
          ontouchend="keys['ArrowLeft']=false">
    ⬅
  </button>

  <button class="control-btn"
          ontouchstart="keys['ArrowRight']=true"
          ontouchend="keys['ArrowRight']=false">
    ➡
  </button>
</div>

<footer>
  <marquee>
    © 2026 Srivats Sridaran. All Rights Reserved.
  </marquee>
</footer>

<script>

  const canvas = document.getElementById("gameCanvas");
  const ctx = canvas.getContext("2d");

  function resizeCanvas(){

    let width=Math.min(window.innerWidth*0.95,400);

    canvas.style.width=width+"px";
    canvas.style.height=(width*1.5)+"px";
  }

  resizeCanvas();
  window.addEventListener("resize",resizeCanvas);

  let keys={};

  document.addEventListener("keydown",e=>{
    keys[e.key]=true;
  });

  document.addEventListener("keyup",e=>{
    keys[e.key]=false;
  });

  let touchStartX=0;

  canvas.addEventListener("touchstart",e=>{
    touchStartX=e.touches[0].clientX;
  });

  canvas.addEventListener("touchmove",e=>{

    let x=e.touches[0].clientX;

    if(x<touchStartX-10){
      keys["ArrowLeft"]=true;
      keys["ArrowRight"]=false;
    }

    if(x>touchStartX+10){
      keys["ArrowRight"]=true;
      keys["ArrowLeft"]=false;
    }

    touchStartX=x;

    e.preventDefault();

  },{passive:false});

  canvas.addEventListener("touchend",()=>{

    keys["ArrowLeft"]=false;
    keys["ArrowRight"]=false;

  });

  let player;
  let enemies;
  let roadLines;
  let speed;
  let score;
  let gameOver;

  function init(){

    player={
      x:180,
      y:500,
      w:40,
      h:80
    };

    enemies=[];
    roadLines=[];

    speed=5;
    score=0;
    gameOver=false;

    for(let i=0;i<10;i++){

      roadLines.push({
        x:195,
        y:i*60
      });

    }

  }function spawnEnemy(){

    const lanes=[80,180,280];

    const x=lanes[Math.floor(Math.random()*lanes.length)];

    enemies.push({
      x:x,
      y:-100,
      w:40,
      h:80
    });

  }

  function update(){

    if(gameOver) return;

    if(keys["ArrowLeft"] && player.x>60){
      player.x-=6;
    }

    if(keys["ArrowRight"] && player.x<300){
      player.x+=6;
    }

    for(let line of roadLines){

      line.y+=speed;

      if(line.y>canvas.height){
        line.y=-60;
      }

    }

    for(let e of enemies){

      e.y+=speed;

      if(
              player.x<e.x+e.w &&
              player.x+player.w>e.x &&
              player.y<e.y+e.h &&
              player.y+player.h>e.y
      ){
        gameOver=true;
      }

    }

    enemies=enemies.filter(e=>e.y<canvas.height);

    score++;
    speed+=0.002;

  }

  function drawCar(x,y,color){

    ctx.fillStyle=color;
    ctx.fillRect(x,y,40,80);

    ctx.fillStyle="black";
    ctx.fillRect(x+5,y+10,30,20);

  }

  function draw(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    /* Road */
    ctx.fillStyle="#333";
    ctx.fillRect(50,0,300,canvas.height);

    /* Lane divider */
    ctx.fillStyle="white";

    for(let line of roadLines){
      ctx.fillRect(line.x,line.y,10,40);
    }

    /* Player */
    drawCar(player.x,player.y,"lime");

    /* Enemies */
    for(let e of enemies){
      drawCar(e.x,e.y,"red");
    }

    /* HUD */
    ctx.fillStyle="white";
    ctx.font=window.innerWidth<600 ? "16px Arial" : "20px Arial";

    ctx.fillText("Score: "+score,10,30);
    ctx.fillText("Speed: "+speed.toFixed(1),10,60);

    if(gameOver){

      ctx.font=window.innerWidth<600 ? "30px Arial" : "40px Arial";
      ctx.fillStyle="red";
      ctx.fillText("GAME OVER",55,300);

      ctx.font="20px Arial";
      ctx.fillStyle="white";
      ctx.fillText("Tap Restart",125,340);

    }

  }

  function loop(){

    update();
    draw();

    requestAnimationFrame(loop);

  }

  function restartGame(){

    init();

  }

  init();

  setInterval(function(){

    if(!gameOver){
      spawnEnemy();
    }

  },1200);

  loop();

</script>

</body>
</html>
