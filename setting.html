<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings</title>

  <style>
    /*================ Loader ==================================*/
    #loader-wrapper {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }
    .loader {
      position: relative;
      transform: rotateZ(45deg);
      perspective: 1000px;
      border-radius: 50%;
      width: 48px;
      height: 48px;
      color: #fff;
    }

    .loader {
      position: relative;
      width: 100px;
      height: 100px;
    }
    .loader:before{
      content: '';
      position: absolute;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      top: 50%;
      left: 0;
      transform: translate(-5px, -50%);
      background: linear-gradient(to right, #fff 50%, #de3500 50%) no-repeat;
      background-size: 200% auto;
      background-position: 100% 0;
      animation: colorBallMoveX 1.5s linear infinite alternate;
    }
    .loader:after{
      content: '';
      position: absolute;
      left: 50%;
      top: 0;
      transform: translateX(-50%);
      width: 2px;
      height: 100%;
      background: #de3500;
    }
    @keyframes colorBallMoveX {
      0%  {
        background-position: 0% 0;
        transform: translate(-15px, -50%);
      }
      15%  , 25% {
        background-position: 0% 0;
        transform: translate(0px, -50%);
      }
      75% , 85% {
        background-position: 100% 0;
        transform: translate(50px, -50%);
      }
      100% {
        background-position: 100% 0;
        transform: translate(65px, -50%);
      }
    }


    body{
      background:#111;
      color:#0f0;
      font-family:monospace;
      padding:20px;
    }

    #modeDisplay{
      margin-bottom:10px;
      padding:5px;
      border:2px solid #0f0;
    }

    #console{
      height:300px;
      overflow-y:auto;
      border:3px solid green;
      padding:10px;
      margin-bottom:10px;
    }

    input{
      width:100%;
      padding:10px;
      background:black;
      color:#0f0;
      border:1px solid #0f0;
    }

    a{ color:#0f0; }
  </style>
</head>

<body>
<div id="loader-wrapper">
  <span class="loader"></span>
</div>

<div id="main-content" style="display: none;">
  <a href="index.html">← Back</a>
  <h2>⚙ Settings Terminal</h2>

  <div id="modeDisplay"></div>

  <div id="console"></div>
  <input id="cmd">

  <script>

    /* ================= STATE ================= */

    let settings = {
      theme: "light",
      title: "Kalps Studio"
    };

    let updateInProgress = false;
    let updateProgress = 0;
    let updateInterval = null;

    /* ================= ROLE SYSTEM ================= */

    function getRole(){
      return sessionStorage.getItem("role") || "user";
    }

    function getPrompt(){
      return "C://" + getRole().toLowerCase() + "settings/Terminal>";
    }

    /* ================= INIT ================= */

    function load(){
      let s = localStorage.getItem("settings");
      if(s) Object.assign(settings, JSON.parse(s));

      apply();
      updateInputPrompt();
      bootMessage();
    }

    /* ================= APPLY ================= */

    function apply(){
      document.body.style.color = "#0f0";
      document.title = settings.title;
      updateModeDisplay();
    }

    /* ================= SAVE ================= */

    function save(){
      localStorage.setItem("settings", JSON.stringify(settings));
    }

    /* ================= UI ================= */

    function updateModeDisplay(){
      document.getElementById("modeDisplay").innerHTML =
              "Mode: " + getRole().toUpperCase() +
              " | Theme: " + settings.theme.toUpperCase();
    }

    function updateInputPrompt(){
      document.getElementById("cmd").placeholder = getPrompt();
    }

    /* ================= PRINT ================= */

    function print(msg, isCommand=false){
      const con = document.getElementById("console");

      con.innerHTML += "<div>" + (isCommand ? getPrompt() : "> ") + msg + "</div>";
      con.scrollTop = con.scrollHeight;
    }

    /* ================= UPDATE SYSTEM ================= */

    function fakeScan(callback){

      const scan = [
        "Running system scan...",
        "Checking kernel integrity...",
        "Scanning files... 20%",
        "Scanning files... 55%",
        "Scanning files... 80%",
        "No threats detected",
        "Update package verified"
      ];

      let i = 0;

      let interval = setInterval(()=>{
        print(scan[i]);
        i++;
        if(i >= scan.length){
          clearInterval(interval);
          callback();
        }
      }, 400);
    }

    function startDownload(){

      updateInProgress = true;
      updateProgress = 0;

      print("Downloading update package...");

      updateInterval = setInterval(()=>{

        if(updateProgress < 100){

          updateProgress += Math.floor(Math.random()*7)+1;
          if(updateProgress > 100) updateProgress = 100;

          print("Progress: " + updateProgress + "%");

        } else {

          clearInterval(updateInterval);
          updateInProgress = false;
          print("✅ Update complete");

        }

      }, 500);
    }

    /* ================= COMMANDS ================= */

    function run(command){

      print(command, true);

      let p = command.trim().split(" ");
      let role = getRole();

      if(p[0] === "help"){
        print("theme/toggle/title/time/date/clear/update/update --force/update status");
        return;
      }

      if(p[0] === "clear"){
        document.getElementById("console").innerHTML = "";
        return;
      }

      if(p[0] === "theme"){
        settings.theme = p[1];
        save(); apply();
        return;
      }

      if(p[0] === "toggle" && p[1] === "theme"){
        settings.theme = settings.theme === "dark" ? "light" : "dark";
        save(); apply();
        return;
      }

      if(p[0] === "title"){
        settings.title = p.slice(1).join(" ");
        save(); apply();
        return;
      }

      if(p[0] === "time"){
        print(new Date().toLocaleTimeString());
        return;
      }

      if(p[0] === "date"){
        print(new Date().toLocaleDateString());
        return;
      }

      /* ================= UPDATE COMMANDS ================= */

      if(p[0] === "update"){

        if(p[1] === "status"){
          if(!updateInProgress){
            print("No update running.");
          } else {
            print("Update running...");
            print("Progress: " + updateProgress + "%");
          }
          return;
        }

        if(p[1] === "--force"){
          print("Force update started...");
          startDownload();
          return;
        }

        print("Starting system scan...");
        fakeScan(()=>{
          startDownload();
        });

        return;
      }

      /* ================= ADMIN ================= */

      if(role === "admin"){

        switch(p[0]){

          case "role":
            sessionStorage.setItem("role", p[1]);
            updateModeDisplay();
            updateInputPrompt();
            print("Role changed to " + p[1]);
            break;

          case "set":
            settings[p[1]] = p.slice(2).join(" ");
            save(); apply();
            print("Updated");
            break;

          case "get":
            print(settings[p[1]]);
            break;

          case "delete":
            delete settings[p[1]];
            save(); apply();
            print("Deleted");
            break;

          case "show":
            print(JSON.stringify(settings));
            break;

          case "reset":
            settings = { theme: "light", title: "Kalps Studio" };
            save(); apply();
            print("Reset done");
            break;

          case "sysinfo":
            print(navigator.userAgent);
            break;

          case "wipe":
            localStorage.clear();
            sessionStorage.clear();
            print("Wiped");
            break;

          case "reload":
            location.reload();
            break;

          default:
            print("Unknown admin command");
        }

      } else {
        print("Unknown command");
      }
    }

    /* ================= INPUT ================= */

    document.getElementById("cmd").addEventListener("keydown", e=>{
      if(e.key === "Enter"){
        run(e.target.value);
        e.target.value = "";
      }
    });

    /* ================= BOOT ================= */

    function bootMessage(){

      const lines = [
        "Initializing system...",
        "Loading settings...",
        "Starting terminal...",
        "Welcome " + getRole().toUpperCase(),
        "Type help"
      ];

      let i = 0;

      let interval = setInterval(()=>{
        print(lines[i]);
        i++;
        if(i >= lines.length) clearInterval(interval);
      }, 300);
    }

    /* ================= START ================= */

    window.addEventListener("load", () => {
      setTimeout(() => {
        const loader = document.getElementById("loader-wrapper");
        const main = document.getElementById("main-content");

        if(loader) loader.style.display = "none";
        if(main) main.style.display = "block";

        load(); // start terminal AFTER loader ends
      }, 1500);
    });

  </script>
</div>
</body>
</html>
