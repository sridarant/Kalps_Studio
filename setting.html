<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings</title>

  <style>
    body{
      background:#111;
      color:#00ff00;
      font-family:monospace;
      padding:20px;
    }

    /* ================= LOADER ================= */
    #loader-wrapper{
      position:fixed;
      inset:0;
      background:#111;
      display:flex;
      justify-content:center;
      align-items:center;
      z-index:9999;
    }

    .loader{
      width:60px;
      height:60px;
      border:6px solid #222;
      border-top:6px solid #00ff00;
      border-radius:50%;
      animation:spin 1s linear infinite;
    }

    @keyframes spin{
      to{transform:rotate(360deg);}
    }

    #main-content{
      display:none;
    }

    /* ================= UI ================= */
    #modeDisplay{
      border:2px solid #00ff00;
      padding:6px;
      margin-bottom:10px;
    }

    #console{
      height:300px;
      overflow-y:auto;
      border:3px solid #00ff00;
      padding:10px;
      margin-bottom:10px;
      background:black;
    }

    input{
      width:100%;
      padding:10px;
      background:black;
      color:#00ff00;
      border:1px solid #00ff00;
    }

    a{color:#00ff00;}
  </style>
</head>

<body>

<!-- ================= LOADER ================= -->
<div id="loader-wrapper">
  <div class="loader"></div>
</div>

<div id="main-content">

  <a href="index.html">← Back</a>
  <h2>⚙ Settings Terminal</h2>

  <div id="modeDisplay"></div>
  <div id="console"></div>
  <input id="cmd" placeholder="type help...">

  <script>

    /* ================= STATE ================= */
    let settings = {
      theme:"light",
      title:"Kalps Studio"
    };

    let updateInProgress = false;
    let updateProgress = 0;

    /* ================= ROLE SYSTEM (KEEPED) ================= */
    function getRole(){
      return sessionStorage.getItem("role") || "user";
    }

    function getPrompt(){
      return "C://" + getRole() + "/settings/>";
    }

    /* ================= PRINT ================= */
    function print(msg){
      const con = document.getElementById("console");

      const div = document.createElement("div");
      div.textContent = "> " + msg;

      con.appendChild(div);
      con.scrollTop = con.scrollHeight;
    }

    /* ================= UI ================= */
    function updateUI(){
      document.getElementById("modeDisplay").innerText =
              "Mode: " + getRole().toUpperCase() +
              " | Theme: " + settings.theme.toUpperCase();

      document.title = settings.title;
    }

    /* ================= COMMANDS ================= */
    function run(cmd){

      print(cmd);

      let p = cmd.trim().split(" ");
      let role = getRole();

      if(p[0] === "help"){
        print("theme | toggle theme | title | time | date | clear | update | update status | update check | update --force");
        return;
      }

      if(p[0] === "clear"){
        document.getElementById("console").innerHTML = "";
        return;
      }

      if(p[0] === "theme"){
        settings.theme = p[1];
        updateUI();
        return;
      }

      if(p[0] === "toggle" && p[1] === "theme"){
        settings.theme = settings.theme === "dark" ? "light" : "dark";
        updateUI();
        return;
      }

      if(p[0] === "title"){
        settings.title = p.slice(1).join(" ");
        updateUI();
        return;
      }

      if(p[0] === "time"){
        print(new Date().toLocaleTimeString());
        return;
      }

      if(p[0] === "date"){
        print(new Date().toLocaleDateString());
        return;
      }

      /* ================= UPDATE ================= */
      if(p[0] === "update"){

        if(p[1] === "status"){
          print("Update running: " + updateInProgress);
          print("Progress: " + updateProgress + "%");
          return;
        }

        if(p[1] === "check"){
          print("Opening update checker...");
          setTimeout(() => {
            window.location.href = "update.html";
          }, 800);
          return;
        }

        if(p[1] === "--force"){
          print("Force update...");
          window.location.href = "update.html";
          return;
        }

        print("Starting update...");
        window.location.href = "update.html";
        return;
      }

      /* ================= ADMIN (KEEPED ROLE SYSTEM) ================= */
      if(role === "admin"){

        if(p[0] === "role"){
          sessionStorage.setItem("role", p[1]);
          print("Role set to " + p[1]);
          updateUI();
          return;
        }

        if(p[0] === "set"){
          settings[p[1]] = p.slice(2).join(" ");
          updateUI();
          return;
        }

        if(p[0] === "get"){
          print(settings[p[1]]);
          return;
        }

        if(p[0] === "reset"){
          settings = {theme:"light", title:"Kalps Studio"};
          updateUI();
          print("Reset done");
          return;
        }

      }

      print("Unknown command");
    }

    /* ================= INPUT ================= */
    document.getElementById("cmd").addEventListener("keydown", e=>{
      if(e.key === "Enter"){
        run(e.target.value);
        e.target.value = "";
      }
    });

    /* ================= LOADER SYSTEM (KEPT + FIXED) ================= */
    window.addEventListener("load", () => {

      setTimeout(() => {

        document.getElementById("loader-wrapper").style.display = "none";
        document.getElementById("main-content").style.display = "block";

        print("System loaded...");
        print("Type help");

      }, 1500);

    });

    /* ================= INIT ================= */
    updateUI();

  </script>

</div>

</body>
</html>
