<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Game Hub</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background:linear-gradient(135deg,#1e3c72,#2a5298);
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
        }

        /* Container */
        .container{
            text-align:center;
            background:rgba(255,255,255,0.1);
            backdrop-filter:blur(10px);
            padding:30px;
            border-radius:20px;
            box-shadow:0 10px 25px rgba(0,0,0,0.3);
            max-width:500px;
            width:100%;
        }

        h1{
            color:white;
            margin-bottom:25px;
            font-size:clamp(22px,5vw,32px);
        }

        /* Games grid */
        .games{
            display:grid;
            grid-template-columns:repeat(2,1fr);
            gap:15px;
        }

        /* Buttons */
        .game-btn{
            display:flex;
            justify-content:center;
            align-items:center;
            height:110px;
            background:white;
            color:#1e3c72;
            text-decoration:none;
            font-size:18px;
            font-weight:bold;
            border-radius:15px;
            transition:0.2s;
            box-shadow:0 5px 15px rgba(0,0,0,0.2);
            user-select:none;
            touch-action:manipulation;
        }

        /* Hover + tap effect */
        .game-btn:hover{
            transform:translateY(-5px);
            background:#ffd54f;
            color:black;
        }

        .game-btn:active{
            transform:scale(0.97);
        }

        /* Disabled look (for future use) */
        .game-btn.disabled{
            pointer-events:none;
            opacity:0.5;
        }

        /* Mobile */
        @media(max-width:500px){

            .games{
                grid-template-columns:1fr;
            }

            .game-btn{
                height:100px;
                font-size:16px;
            }

        }

    </style>
</head>

<body>

<div class="container">

    <h1>🎮 Game Hub</h1>

    <div class="games">

        <a class="game-btn" href="dodge the hack pro-.html">
            Dodge the Hack Pro
        </a>

        <a class="game-btn" href="dodge the hack.html">
            Dodge the Hack
        </a>

        <a class="game-btn" href="highway racer.html">
            Highway Racer
        </a>

        <a class="game-btn disabled" href="canvas-art.html">
            Art Attack Paint Studio
        </a>

    </div>

</div>

</body>
</html>
