<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Hub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            text-align: center;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        h1 {
            color: white;
            margin-bottom: 30px;
        }

        .games {
            display: grid;
            grid-template-columns: repeat(2, 180px);
            gap: 20px;
            justify-content: center;
        }

        .game-btn {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 120px;
            background: white;
            color: #1e3c72;
            text-decoration: none;
            font-size: 20px;
            font-weight: bold;
            border-radius: 15px;
            transition: 0.3s;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .game-btn:hover {
            transform: translateY(-5px);
            background: #ffd54f;
            color: black;
        }

        @media (max-width: 500px) {
            .games {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🎮 Game Hub</h1>

    <div class="games">
        <a class="game-btn" href="dodge the hack pro-.html">Dodge the hack pro mode</a>
        <a class="game-btn" href="dodge the hack.html">Dodge the hack</a>
        <a class="game-btn" href="highway racer.html">Highway racer</a>
        <a class="game-btn" href="canvas.art.html" disabled>Art.attack Art Gallery</a>
    </div>
</div>

</body>
</html>
