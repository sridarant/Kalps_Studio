<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Canva Style Editor</title>

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#181818;
  color:white;
}

/* Layout */
.topbar{
  height:50px;
  background:#242424;
  display:flex;
  align-items:center;
  gap:10px;
  padding:0 10px;
}

.sidebar{
  width:200px;
  background:#2b2b2b;
  padding:10px;
}

.editor{
  display:flex;
  height:calc(100vh - 50px);
}

/* Canvas */
.canvas-area{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#aaa;
}

#canvas{
  width:900px;
  height:550px;
  background:white;
  position:relative;
}

/* Elements */
.element{
  position:absolute;
  cursor:move;
  border:2px solid transparent;
}

.element.selected{
  border:2px dashed #00aaff;
}

/* Resize handle */
.handle{
  width:10px;
  height:10px;
  background:#00aaff;
  position:absolute;
  right:-5px;
  bottom:-5px;
  cursor:nwse-resize;
}

/* Shapes */
.rect{ width:120px; height:100px; background:red; }
.circle{ width:100px; height:100px; background:blue; border-radius:50%; }

/* Text */
.text{
  font-size:24px;
  color:black;
  min-width:50px;
}

/* Sidebar buttons */
button{
  width:100%;
  margin-bottom:8px;
  padding:8px;
  border:none;
  background:#444;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- TOPBAR -->
<div class="topbar">
  <input type="color" id="color">
  <input type="range" id="fontSize" min="10" max="80" value="24">
  <button onclick="bringFront()">Bring Front</button>
  <button onclick="sendBack()">Send Back</button>
  <button onclick="download()">Download</button>
</div>

<div class="editor">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <button onclick="addText()">Text</button>
    <button onclick="addRect()">Rectangle</button>
    <button onclick="addCircle()">Circle</button>
    <input type="file" onchange="uploadImage(event)">
  </div>

  <!-- CANVAS -->
  <div class="canvas-area">
    <div id="canvas"></div>
  </div>

</div>

<script>
let selected = null;

/* SELECT ELEMENT */
function selectElement(el){
  document.querySelectorAll(".element").forEach(e=>e.classList.remove("selected"));
  selected = el;
  el.classList.add("selected");
}

/* DRAG */
function makeDraggable(el){
  let offsetX, offsetY;

  el.addEventListener("mousedown", (e)=>{
    selectElement(el);

    offsetX = e.offsetX;
    offsetY = e.offsetY;

    document.onmousemove = (e)=>{
      el.style.left = (e.pageX - offsetX) + "px";
      el.style.top = (e.pageY - offsetY - 50) + "px";
    };

    document.onmouseup = ()=>{
      document.onmousemove = null;
    };
  });
}

/* RESIZE */
function addResize(el){
  let handle = document.createElement("div");
  handle.className = "handle";
  el.appendChild(handle);

  handle.addEventListener("mousedown", (e)=>{
    e.stopPropagation();

    document.onmousemove = (e)=>{
      el.style.width = e.offsetX + "px";
      el.style.height = e.offsetY + "px";
    };

    document.onmouseup = ()=>{
      document.onmousemove = null;
    };
  });
}

/* ADD ELEMENTS */
function addText(){
  let el = document.createElement("div");
  el.className = "element text";
  el.contentEditable = true;
  el.innerText = "Edit text";
  el.style.left = "100px";
  el.style.top = "100px";
  canvas.appendChild(el);
  makeDraggable(el);
  addResize(el);
}

function addRect(){
  let el = document.createElement("div");
  el.className = "element rect";
  el.style.left = "150px";
  el.style.top = "150px";
  canvas.appendChild(el);
  makeDraggable(el);
  addResize(el);
}

function addCircle(){
  let el = document.createElement("div");
  el.className = "element circle";
  el.style.left = "200px";
  el.style.top = "200px";
  canvas.appendChild(el);
  makeDraggable(el);
  addResize(el);
}

/* IMAGE */
function uploadImage(e){
  let img = document.createElement("img");
  img.src = URL.createObjectURL(e.target.files[0]);
  img.className = "element";
  img.style.width = "150px";
  img.style.left = "250px";
  img.style.top = "150px";
  canvas.appendChild(img);
  makeDraggable(img);
  addResize(img);
}

/* COLOR + FONT */
document.getElementById("color").oninput = ()=>{
  if(selected){
    selected.style.background = selected.style.background ? 
      document.getElementById("color").value : "";
    selected.style.color = document.getElementById("color").value;
  }
};

document.getElementById("fontSize").oninput = ()=>{
  if(selected && selected.classList.contains("text")){
    selected.style.fontSize = document.getElementById("fontSize").value + "px";
  }
};

/* LAYERS */
function bringFront(){
  if(selected) selected.style.zIndex = 999;
}

function sendBack(){
  if(selected) selected.style.zIndex = 1;
}

/* DELETE KEY */
document.addEventListener("keydown", (e)=>{
  if(e.key === "Delete" && selected){
    selected.remove();
    selected = null;
  }
});

/* DOWNLOAD */
function download(){
  html2canvas(canvas).then(c=>{
    let link = document.createElement("a");
    link.download = "design.png";
    link.href = c.toDataURL();
    link.click();
  });
}
</script>

</body>
</html>
