<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>System Optimization Engine</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:"Segoe UI Variable","Segoe UI",sans-serif;
      background:#0b1220;
      color:white;
      height:100vh;
      overflow:hidden;
    }

    /* ================= UPDATE BANNER ================= */

    #updateBanner{
      position:fixed;
      top:0;
      width:100%;
      background:linear-gradient(90deg,#0078d7,#00a2ff);
      padding:12px;
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      align-items:center;
      justify-content:center;
      z-index:9999;
    }

    #updateBanner select,
    #updateBanner button{
      padding:10px;
      border:none;
      border-radius:8px;
    }

    #updateBanner select{
      background:#111827;
      color:white;
    }

    #updateBanner button{
      background:white;
      color:#0078d7;
      cursor:pointer;
      font-weight:bold;
    }

    #updateText{
      width:100%;
      text-align:center;
      font-size:14px;
    }

    /* ================= MAIN APP ================= */

    .container{
      display:none; /* 🔥 hidden until update check passes */
      position:absolute;
      top:60px;
      left:50%;
      transform:translateX(-50%);
      width:92%;
      max-width:880px;
      padding:55px;
      border-radius:28px;
      background:rgba(15,23,42,0.85);
      border:1px solid rgba(255,255,255,0.08);
      backdrop-filter:blur(18px);
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      margin-bottom:40px;
    }

    .logo{
      width:44px;
      height:44px;
      background:#0078d7;
      border-radius:10px;
      display:grid;
      place-items:center;
    }

    .title{
      font-size:22px;
      font-weight:600;
    }

    select,input,button{
      width:100%;
      padding:16px;
      margin-bottom:12px;
      border-radius:12px;
      border:none;
      font-size:16px;
    }

    select{background:#111827;color:white;}
    input{background:#0f172a;color:white;display:none;}

    button{
      background:#0078d7;
      color:white;
      cursor:pointer;
    }

    .update{
      display:none;
      text-align:center;
    }

    .percent{
      font-size:64px;
    }

    .status{
      color:#cbd5e1;
      margin-bottom:20px;
    }

    .bar{
      height:12px;
      background:rgba(255,255,255,0.1);
      border-radius:999px;
      overflow:hidden;
    }

    .fill{
      height:100%;
      width:0%;
      background:linear-gradient(90deg,#00a2ff,#0078d7);
    }

    .popup{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.7);
      display:none;
      justify-content:center;
      align-items:center;
    }

    .modal{
      background:#111827;
      padding:30px;
      border-radius:18px;
      text-align:center;
    }

  </style>
</head>

<body>

<!-- ================= UPDATE CHECK SCREEN ================= -->
<div id="updateBanner">

  <div id="updateText">
    🔔 Check for system update to continue
  </div>

  <select id="osSelect">
    <option value="">Select OS</option>
    <option>Windows</option>
    <option>macOS</option>
    <option>Linux</option>
    <option>Android</option>
    <option>iOS</option>
  </select>

  <select id="chipSelect">
    <option value="">Processor</option>
  </select>

  <button onclick="checkUpdate()">Check Update</button>

</div>

<!-- ================= MAIN SYSTEM (LOCKED FIRST) ================= -->

<div class="container" id="app">

  <div class="brand">
    <div class="logo">⊞</div>
    <div class="title">System Optimization Engine</div>
  </div>

  <select id="deviceSelect" onchange="toggleCustom()">
    <!-- Intel -->

    <option>Intel® Core™ Ultra 9 285K</option>

    <option>Intel® Core™ Ultra 7 265K</option>

    <option>Intel® Core™ Ultra 5 245K</option>



    <option>Intel® Core™ i9-14900KS</option>

    <option>Intel® Core™ i9-14900K</option>

    <option>Intel® Core™ i7-14700K</option>

    <option>Intel® Core™ i5-14600K</option>

    <option>Intel® Core&trade; i3-14400K</option>



    <option>Intel® Xeon® W9</option>

    <option>Intel® Xeon® Platinum</option>



    <!-- AMD -->

    <option>AMD Ryzen™ 9 9950X</option>

    <option>AMD Ryzen™ 9 9900X</option>

    <option>AMD Ryzen™ 7 9800X3D</option>

    <option>AMD Ryzen™ 7 9700X</option>

    <option>AMD Ryzen™ 5 9600X</option>



    <option>AMD Threadripper™ PRO 7995WX</option>

    <option>AMD EPYC™ 9754</option>



    <!-- Apple -->

    <option>Apple M4 Max</option>

    <option>Apple M4 Pro</option>

    <option>Apple M3 Ultra</option>

    <option>Apple M3 Max</option>

    <option>Apple M2 Ultra</option>



    <!-- Qualcomm -->

    <option>Snapdragon® X Elite</option>
    <option>Snapdragon® X Plus</option>



    <!-- ARM -->

    <option>ARM Cortex™ X4</option>

    <option>ARM Neoverse™ V2</option>



    <!-- NVIDIA -->

    <option>NVIDIA Grace CPU Superchip</option>



    <!-- Cloud -->

    <option>Azure Virtual Processor</option>

    <option>AWS Graviton4</option>

    <option>Google Axion ARM CPU</option>



    <!-- Legacy -->

    <option>Intel® Pentium® Gold</option>

    <option>Intel® Celeron®</option>

    <option>AMD Athlon™</option>
    <option value="custom">Custom Device</option>
  </select>

  <input id="customName" placeholder="Device name">
  <input id="customYear" type="number" placeholder="Release year">

  <button onclick="startUpdate()">Start Optimization</button>

  <div class="update" id="update">

    <div class="percent" id="percent">0%</div>
    <div class="status" id="status">Initializing...</div>

    <div class="bar">
      <div class="fill" id="fill"></div>
    </div>

    <div id="deviceName"></div>

  </div>

</div>

<!-- ================= POPUP ================= -->

<div class="popup" id="popup">
  <div class="modal">
    <h2>Optimization Complete</h2>
    <button onclick="location.reload(index.html)">Restart</button>
  </div>
</div>

<script>

  /* ================= UPDATE LOGIC ================= */

  const osSelect = document.getElementById("osSelect");
  const chipSelect = document.getElementById("chipSelect");

  osSelect.addEventListener("change", () => {

    chipSelect.innerHTML = '<option value="">Processor</option>';

    let chips = ["Any"];

    if(osSelect.value==="Windows") chips=["Intel","AMD"];
    if(osSelect.value==="macOS") chips=["Apple Silicon","Intel"];
    if(osSelect.value==="Linux") chips=["AMD","Intel","ARM"];
    if(osSelect.value==="Android") chips=["Snapdragon","MediaTek"];
    if(osSelect.value==="iOS") chips=["A-Series"];

    chips.forEach(c=>{
      let opt=document.createElement("option");
      opt.textContent=c;
      chipSelect.appendChild(opt);
    });

  });

  function checkUpdate(){

    const os=osSelect.value;
    const chip=chipSelect.value;

    if(!os||!chip){
      alert("Select OS and processor");
      return;
    }

    // 🔥 ALWAYS allow update
    document.getElementById("updateText").innerHTML =
            "✅ Update available. Unlocking system...";

    setTimeout(()=>{

      document.getElementById("updateBanner").style.display="none";
      document.getElementById("app").style.display="block";

    },1200);

  }

  /* ================= MAIN ENGINE ================= */

  const deviceSelect=document.getElementById("deviceSelect");
  const customName=document.getElementById("customName");
  const customYear=document.getElementById("customYear");

  const update=document.getElementById("update");
  const percent=document.getElementById("percent");
  const status=document.getElementById("status");
  const fill=document.getElementById("fill");
  const deviceName=document.getElementById("deviceName");

  const popup=document.getElementById("popup");

  let progress=0;

  function toggleCustom(){
    if(deviceSelect.value==="custom"){
      customName.style.display="block";
      customYear.style.display="block";
    } else {
      customName.style.display="none";
      customYear.style.display="none";
    }
  }

  function startUpdate(){

    update.style.display="block";

    let label=deviceSelect.value;

    if(label==="custom"){
      label=customName.value+" ("+customYear.value+")";
    }

    deviceName.innerText=label;

    let messages=[
      "Optimizing system...",
      "Boosting performance...",
      "Cleaning cache...",
      "Finalizing..."
    ];

    const timer=setInterval(()=>{

      if(progress<100){

        progress+=Math.floor(Math.random()*4)+1;

        percent.innerText=progress+"%";
        fill.style.width=progress+"%";

        status.innerText=messages[Math.floor(Math.random()*messages.length)];

      } else {
        clearInterval(timer);
        popup.style.display="flex";
      }

    },500);

  }

</script>

</body>
</html>
